<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificação de Número</title>
    <link rel="stylesheet" href="css/principal.css">
</head>
<body>

    <div class="phone">

        <div class="top-bar">
            <img src="./img/logo-removebg-preview.png" alt="Bradesco" class="logo">
        </div>

        <div class="content">

            <h2>Verificar Número</h2>

            <label>Número suspeito</label>
            <input type="text" id="numero" placeholder="+55 11 99999-9999">

            <button id="btn-verificar" class="btn-check">
                Verificar
            </button>

            <div id="resultado" class="result-card"></div>

        </div>

        <a href="report.html" class="report-btn">Reportar</a>

    </div>

    <script>
        const API_BASE = 'http://localhost:3000/api'

        const input = document.getElementById('numero')
        const btn   = document.getElementById('btn-verificar')
        const card  = document.getElementById('resultado')

        function showCard(tipo, icon, titulo, detalhe) {
            card.className = `result-card ${tipo} show`
            card.innerHTML = `
                <div class="icon">${icon}</div>
                <div class="titulo">${titulo}</div>
                <div class="detalhe">${detalhe}</div>
            `
        }

        async function verificar() {
            const numero = input.value.trim()

            if (!numero) {
                showCard('erro', '⚠️', 'Campo vazio', 'Digite um número para verificar.')
                return
            }

            btn.disabled = true
            btn.innerHTML = '<span class="loading">⏳</span> Verificando...'
            card.className = 'result-card'

            try {
                const numeroLimpo = numero.replace(/\D/g, '')
                const res  = await fetch(`${API_BASE}/verify/${numeroLimpo}`)
                const data = await res.json()

                if (!res.ok || !data.success) {
                    showCard('erro', '⚠️', 'Erro na consulta', data.message || 'Tente novamente.')
                    return
                }

                if (data.status === 'official') {
                    showCard('oficial', '✅', 'Número Oficial Bradesco',
                        `Canal: ${data.data.channel_name || '—'}<br>${data.data.description || ''}`)
                } else if (data.status === 'suspicious') {
                    showCard('suspeito', '🚨', 'Número Suspeito!',
                        `Este número foi reportado <strong>${data.reports}</strong> vez(es) como fraudulento. Não atenda!`)
                } else {
                    showCard('desconhecido', '❓', 'Número Desconhecido',
                        'Não encontrado na base. Se achar suspeito, use o botão <strong>Reportar</strong>.')
                }
            } catch (err) {
                showCard('erro', '⚠️', 'Sem conexão', 'Não foi possível conectar ao servidor. Verifique se o backend está rodando.')
            } finally {
                btn.disabled = false
                btn.textContent = 'Verificar'
            }
        }

        btn.addEventListener('click', verificar)
        input.addEventListener('keydown', (e) => { if (e.key === 'Enter') verificar() })
    </script>

</body>
</html>
