<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Verificação de Número</title>

    <link rel="stylesheet" href="principal.css">
</head>

<body>

    <div class="phone">

        <!-- 🔴 TOP BAR (igual ao reportar) -->
        <div class="top-bar">
            <img src="./img/logo-removebg-preview.png" alt="Bradesco" class="logo">
        </div>

        <!-- 📱 CONTEÚDO -->
        <div class="content">

            <h2>Verificar Número</h2>

            <label>Número suspeito</label>
            <input type="text" id="numero" placeholder="+55 11 99999-9999">

            <button id="btn-verificar" class="btn-check">
                Verificar
            </button>

            <!-- 📢 RESULTADO -->
            <p id="resultado" class="result"></p>

        </div>

        <!-- 🔙 BOTÃO REPORTAR (canto inferior direito) -->
        <a href="report.html" class="report-btn">
            Reportar
        </a>

    </div>

</body>
</html>
