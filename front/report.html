<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Reportar Número</title>

    <link rel="stylesheet" href="report.css">
</head>

<body>

    <div class="phone">

        <!-- 🔴 TOP BAR -->
        <div class="top-bar">
            <img src="./img/logo-removebg-preview.png" alt="Bradesco" class="logo">
        </div>

        <!-- 📱 CONTEÚDO -->
        <div class="content">

            <h2>Reportar Número Suspeito</h2>

            <form>

                <label>Nome completo</label>
                <input type="text" placeholder="Digite seu nome">

                <label>Email</label>
                <input type="email" placeholder="Digite seu email">

                <label>Número suspeito</label>
                <input type="text" placeholder="Ex: +55 11 99999-9999">

                <label>Mensagem</label>
                <textarea placeholder="Descreva o ocorrido..."></textarea>

                <button type="submit" class="btn-report">
                    Reportar
                </button>

            </form>

        </div>

        <!-- 🔙 BOTÃO VOLTAR -->
        <a href="principal.html" class="back-btn">
                ⬅ Voltar
            </a>

    </div>

</body>
</html>
